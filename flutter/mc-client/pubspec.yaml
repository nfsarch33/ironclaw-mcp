name: mc_client
description: >
  Mission Control client for v259. Connects to fleet members
  (wsl1, wsl2, win1, win2, etc.) directly over the Tailscale vLAN
  or via the OCI SSH-jump tunnel. Pure Dart core so the data-plane
  logic can be unit-tested without a Flutter SDK; the optional
  Flutter shell consumes the same core.
publish_to: "none"
version: 0.2.0+259

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  http: ^1.2.0

dev_dependencies:
  test: ^1.24.0

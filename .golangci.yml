version: "2"
run:
  go: "1.23"
linters:
  enable:
    - bodyclose
    - godot
    - misspell
    - nolintlint
    - revive
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    revive:
      rules:
        - name: exported
          severity: warning
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
      - linters:
          - revive
        text: "stutters"
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/nfsarch33/ironclaw-mcp
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

# golangci-lint configuration
linters-settings:
  goimports:
    local-prefixes: github.com/nfsarch33/ironclaw-mcp
  govet:
    enable-all: true
  revive:
    rules:
      - name: exported
        severity: warning
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  exhaustive:
    default-signifies-exhaustive: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - goimports
    - revive
    - gocritic
    - godot
    - misspell
    - prealloc
    - noctx
    - bodyclose
    - contextcheck
    - nolintlint

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic

run:
  timeout: 5m
  go: "1.23"
